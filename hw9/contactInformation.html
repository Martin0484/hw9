<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>Welcome to Martin Llano's homepage</title>
<link rel="stylesheet" href="assets/css/style.css">
<link rel="stylesheet" href="assets/css/slick.css">
<link rel="stylesheet" href="assets/css/main.css">
</head>

<body>

	<!-- Navigation -->
	<nav class="site-navigation">
		<div class="site-navigation-inner site-container">
			<img src="assets/./images/site-logo.png" alt="site logo">
			<div class="main-navigation">
				<ul class="main-navigation__ul">
					<li><a href="index.html">Home</a></li>
					<li><a href="SchoolInformation.html">School Information</a></li>
					<li><a href="hobbies.html">Hobbies</a></li>
					<li><a href="dreamJob.html">Dream Job</a></li>
					<li><a href="contactInformation.html" class="active">Contact Information</a></li>
				</ul>
			</div>
			<div id="myBtn" class="burger-container" onclick="myFunction(this)">
				<div class="bar1"></div>
				<div class="bar2"></div>
				<div class="bar3"></div>
			</div>
			<script>
				function myFunction(x) {
					x.classList.toggle("change");
				}
			</script>

		</div>
	</nav>
	<!-- Navigation end -->

	<!-- About me -->
	<section class="fh5co-about-me">
		<div class="about-me-inner site-container">
			<article class="portfolio-wrapper">
				<div class="portfolio__img">
					<img src="assets/./images/about-me.jpg" class="about-me__profile" alt="about me profile picture">
				</div>
				<div class="portfolio__bottom">
					<div class="portfolio__name">
						<h2 class="universal-h2">Welcome to Martin's Website!</h2>
					</div>
				</div>
			</article>
			<div class="about-me__text">
				<div class="about-me-slider">
					<div class="about-me-single-slide">
						<h2 class="universal-h2 universal-h2-bckg">Contact Information</h2>
						<table width="100%">
        <tr bgcolor="#94DCF8">
    </tr>
    <tr>
        <td colspan="3">
            <p>Contact Information Coming Soon!</p>
        </td>
        <td colspan="2">
            <img src="https://static.vecteezy.com/system/resources/previews/000/455/528/original/telephone-vector.jpg" alt="Software engineer sitting at desk" width="250" height="200">
        </td>
    </tr>
    <tr>
        <td colspan="5">
            <a href="#top" class="white">Go to Top</a>
        </td>
    </tr>
    </tr>
</table>
					</div>
				</div>
			</div>
		</div>
		<div class="about-me-bckg"></div>
	</section>
	<!-- About me end -->

	<!-- Scripts -->
	<script src="assets/js/jquery.min.js"></script>
	<script src="assets/js/slick.min.js"></script>
	<script src="assets/js/main.js"></script>

</body>
</html>
